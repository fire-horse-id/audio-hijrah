<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="dark:bg-slate-950">
    <div id="nav"></div>

    <main class="max-w-4xl mx-auto px-6 py-20 fade-in">
        <div class="glass-card p-10 md:p-14 shadow-2xl border border-white/5">
            <h1 class="text-4xl font-black mb-12 uppercase tracking-tighter">Support <span class="text-indigo-500">Center</span></h1>
            
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <h3 class="font-black text-xs uppercase tracking-[0.2em] mb-6 text-indigo-500">Hubungi Kami</h3>
                        <div id="socialLinks" class="space-y-4">
                            </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="font-black text-xs uppercase tracking-[0.2em] text-indigo-500">Bantuan Langsung</h3>
                    <div class="glass-card p-6 bg-white/5">
                        <div id="chatBox" class="h-40 overflow-y-auto mb-4 text-xs font-medium space-y-3 custom-scrollbar">
                            <div class="opacity-40 italic">Q: Tidak bisa memutar audio?<br>A: Mohon periksa koneksi internet Anda.</div>
                        </div>
                        <input id="chatInput" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ketik pertanyaan...">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("nav").innerHTML = renderNav();
            document.getElementById("footer").innerHTML = renderFooter();

            loadData().then(data => {
                if (data) {
                    const s = data.support;
                    document.getElementById("socialLinks").innerHTML = `
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[10px] font-bold opacity-40 uppercase mb-1">Email Resmi</p>
                            <p class="text-sm font-bold">${s.email}</p>
                        </div>
                        <a href="${s.whatsapp}" target="_blank" class="block p-4 rounded-2xl bg-green-500/10 border border-green-500/20 hover:bg-green-500/20 transition">
                            <p class="text-sm font-bold text-green-500">Hubungi via WhatsApp</p>
                        </a>
                    `;
                }
            });

            // Logika Chat Bot Sederhana
            const input = document.getElementById("chatInput");
            const chatBox = document.getElementById("chatBox");
            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter" && input.value.trim() !== "") {
                    chatBox.innerHTML += `<div class="text-indigo-400 font-bold text-[10px] uppercase">Anda</div><div>${input.value}</div>`;
                    setTimeout(() => {
                        chatBox.innerHTML += `<div class="text-white font-bold text-[10px] uppercase">Sistem</div><div class="opacity-50 italic">Mohon tunggu, admin FireHorse akan segera merespons.</div>`;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }, 500);
                    input.value = "";
                }
            });
        });
    </script>
</body>
</html>
