<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="nav-root"></div>
    <main class="max-w-2xl mx-auto px-6 pt-32 fade-in">
        <div class="glass-card text-center">
            <h1 class="text-3xl font-black mb-10 uppercase tracking-tighter text-indigo-500">Support Center</h1>
            
            <div class="space-y-6 text-left">
                <div class="opacity-40 text-[10px] font-bold uppercase tracking-widest mb-2 text-center">Quick Chat</div>
                <div id="chatBox" class="h-64 overflow-y-auto bg-black/5 dark:bg-white/5 rounded-2xl p-6 mb-4">
                    <div class="text-sm opacity-50 italic">Sistem siap membantu. Silakan kirimkan pertanyaan Anda...</div>
                </div>
                <div class="relative">
                    <input id="chatInput" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition text-sm" placeholder="Tanya sesuatu...">
                </div>
            </div>
        </div>
    </main>
    <div id="footer-root"></div>
    <script src="assets/js/core.js"></script>
    <script>renderGlobalUI();</script>
</body>
</html>
