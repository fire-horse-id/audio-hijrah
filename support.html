<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="dark:bg-slate-950">
    <div id="nav"></div>
    <main class="max-w-4xl mx-auto px-6 py-20 fade-in">
        <div class="glass-card p-10 shadow-2xl">
            <h1 class="text-4xl font-black mb-10 uppercase tracking-tighter">Support <span class="text-indigo-500">Center</span></h1>
            
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-8">
                    <div>
                        <h3 class="font-black text-xs uppercase tracking-[0.2em] mb-4 opacity-50">Kontak Resmi</h3>
                        <div id="social" class="space-y-4"></div>
                    </div>
                    <div>
                        <h3 class="font-black text-xs uppercase tracking-[0.2em] mb-4 opacity-50">FAQ</h3>
                        <p class="text-sm font-bold">Q: Audio tidak berputar?</p>
                        <p class="text-xs opacity-50">A: Pastikan koneksi internet stabil atau gunakan fitur offline.</p>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="font-black text-xs uppercase tracking-[0.2em] opacity-50">Quick Chat</h3>
                    <div class="relative">
                        <input id="chatInput" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Tanya sesuatu...">
                    </div>
                    <div id="chatBox" class="space-y-3 max-h-40 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById("nav").innerHTML = renderNav();
        document.getElementById("footer").innerHTML = renderFooter();
        
        loadData().then(data => {
            if(data) {
                document.getElementById("social").innerHTML = `
                    <a href="mailto:${data.support.email}" class="block p-4 rounded-2xl bg-white/5 border border-white/5 hover:border-indigo-500/30 transition font-bold text-sm">✉️ Email Support</a>
                    <a href="${data.support.whatsapp}" class="block p-4 rounded-2xl bg-white/5 border border-white/5 hover:border-indigo-500/30 transition font-bold text-sm text-green-500">💬 WhatsApp Premium</a>
                `;
            }
        });

        document.getElementById("chatInput").addEventListener("keypress", e => {
            if(e.key === "Enter" && e.target.value.trim() !== "") {
                const box = document.getElementById("chatBox");
                box.innerHTML += `<div class="text-[10px] font-black opacity-30 uppercase tracking-widest mt-4">You</div><div class="text-sm font-medium">${e.target.value}</div>`;
                box.innerHTML += `<div class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mt-2">Assistant</div><div class="text-sm opacity-50 italic">Mohon tunggu, tim kami segera membalas...</div>`;
                e.target.value = "";
                box.scrollTop = box.scrollHeight;
            }
        });
    </script>
</body>
</html>
