<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="nav-root"></div>
    <main class="max-w-4xl mx-auto px-6 pt-32 fade-in">
        <div class="glass-card p-12">
            <h1 class="text-4xl font-black mb-12 uppercase tracking-tighter text-indigo-500">Support Center</h1>
            
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-6" id="socialLinks">
                    </div>
                
                <div class="space-y-4">
                    <h4 class="text-[10px] font-black opacity-30 uppercase tracking-widest">AI Operator Bot</h4>
                    <div id="chatBox" class="h-48 overflow-y-auto bg-black/5 dark:bg-white/5 rounded-2xl p-4 text-xs space-y-3">
                        <div class="p-2 bg-indigo-500 text-white rounded-lg self-start inline-block">Halo! Ada kendala dengan Audio Hijrah?</div>
                    </div>
                    <div class="flex gap-2">
                        <input id="chatInput" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-indigo-500 transition text-sm" placeholder="Ketik pesan...">
                        <button onclick="sendChat()" class="p-3 bg-indigo-500 rounded-xl">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-root"></div>
    <script src="assets/js/core.js"></script>
    <script>
        renderGlobalUI();
        fetchAppData().then(data => {
            if(data) {
                const s = data.support;
                document.getElementById("socialLinks").innerHTML = `
                    <a href="${s.whatsapp}" class="block p-5 rounded-2xl bg-green-500/10 text-green-500 font-bold">WhatsApp Support</a>
                    <a href="${s.telegram}" class="block p-5 rounded-2xl bg-sky-500/10 text-sky-500 font-bold">Telegram Community</a>
                    <a href="${s.youtube}" class="block p-5 rounded-2xl bg-red-500/10 text-red-500 font-bold">YouTube Channel</a>
                    <p class="text-xs opacity-40 text-center">Email: ${s.email}</p>
                `;
            }
        });
        function sendChat() {
            const inp = document.getElementById("chatInput");
            if(inp.value) {
                document.getElementById("chatBox").innerHTML += `<div class="text-right"><span class="p-2 bg-white/10 rounded-lg inline-block">${inp.value}</span></div>`;
                inp.value = "";
            }
        }
    </script>
</body>
</html>
