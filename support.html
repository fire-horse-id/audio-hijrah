<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support - FireHorse</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="assets/theme.js"></script>
<script src="assets/obfuscator.js"></script>

</head>

<body class="bg-gray-100 dark:bg-black text-black dark:text-white transition duration-500">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white/60 dark:bg-gray-900/60 backdrop-blur p-5 hidden md:block">
    <h1 class="text-xl font-bold mb-6">🔥 FireHorse</h1>

    <nav class="space-y-3">
      <a href="index.html" class="block px-3 py-2 rounded hover:bg-blue-500/20">Home</a>
      <a href="privacy.html" class="block px-3 py-2 rounded hover:bg-blue-500/20">Privacy</a>
      <a href="terms.html" class="block px-3 py-2 rounded hover:bg-blue-500/20">Terms</a>
      <a href="support.html" class="block px-3 py-2 rounded bg-blue-500/20">Support</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="flex-1">

    <!-- TOPBAR -->
    <header class="flex justify-between items-center p-4 backdrop-blur bg-white/40 dark:bg-black/40">
      <h2 class="font-semibold">Support Center</h2>
      <button onclick="toggleTheme()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded">
        Toggle Theme
      </button>
    </header>

    <!-- CONTENT -->
    <main class="p-6">

      <!-- FAQ -->
      <h1 class="text-3xl font-bold mb-6">Bantuan & FAQ</h1>
      <div id="faq" class="space-y-4 mb-10"></div>

      <!-- SOCIAL SUPPORT -->
      <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow mb-10">
        <h2 class="text-xl font-bold mb-4">Hubungi Kami</h2>

        <div class="space-y-3">
          <a id="wa" class="block hover:text-green-500">WhatsApp</a>
          <a id="tg" class="block hover:text-blue-400">Telegram</a>
          <a id="yt" class="block hover:text-red-500">YouTube</a>
          <p class="text-sm mt-3">Email: <span id="email">support@firehorse.id</span></p>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- FLOATING CHATBOT -->
<div class="fixed bottom-4 right-4 w-72 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-lg">

  <p class="font-bold mb-2">🤖 Chat Bot</p>

  <div id="chatBox" class="h-40 overflow-y-auto text-sm mb-2 space-y-1">
    <p class="text-gray-500">Halo! Ada yang bisa dibantu?</p>
  </div>

  <input id="chatInput" type="text" placeholder="Tulis pesan..."
    class="border p-2 w-full rounded text-black"
  />

</div>

<script src="assets/app.js"></script>

<script>
// SIMPLE BOT RESPONSE
document.getElementById("chatInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    const msg = this.value;
    if (!msg) return;

    const box = document.getElementById("chatBox");

    box.innerHTML += `<p><b>Kamu:</b> ${msg}</p>`;

    setTimeout(() => {
      box.innerHTML += `<p><b>Bot:</b> Terima kasih, tim kami akan membantu Anda.</p>`;
      box.scrollTop = box.scrollHeight;
    }, 500);

    this.value = "";
  }
});
</script>

</body>
</html>
