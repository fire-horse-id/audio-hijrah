<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Hijrah | FireHorse.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
    <div id="nav"></div>
    <main class="max-w-7xl mx-auto px-6">
        <section class="flex flex-col md:flex-row items-center gap-12 py-16 md:py-24 fade-in">
            <div class="flex-1 text-center md:text-left space-y-6">
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter" id="appTitle">Loading...</h1>
                <p id="appDesc" class="text-lg opacity-60 max-w-xl mx-auto md:mx-0">Sedang memuat data...</p>
                <a id="playLink" href="#" class="btn-premium shadow-xl">UNDUH SEKARANG</a>
            </div>
            <div class="flex-1 flex justify-center">
                <div class="glass-card p-8 bg-white/5 shadow-2xl">
                    <div class="bg-white p-3 rounded-2xl"><img id="qrCode" class="w-40 h-40"></div>
                </div>
            </div>
        </section>
        <div id="featureGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 py-12"></div>
    </main>
    <div id="footer"></div>
    <script src="assets/js/app.js"></script>
    <script>
        renderGlobalUI();
        loadData().then(data => {
            if(data) {
                document.getElementById("appTitle").innerText = data.developer.app;
                document.getElementById("appDesc").innerText = data.description;
                document.getElementById("playLink").href = data.developer.playstore;
                document.getElementById("qrCode").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.developer.playstore)}`;
                document.getElementById("featureGrid").innerHTML = data.features.map(f => `
                    <div class="glass-card p-8"><h4 class="font-black uppercase tracking-tighter">${f}</h4></div>
                `).join("");
            }
        });
    </script>
</body>
</html>
